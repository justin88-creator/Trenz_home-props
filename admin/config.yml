backend:
  name: test-repo

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "properties"
    label: "Properties"
    files:
      - label: "Property Listings"
        name: "propertyListings"
        file: "data/properties.json"
        fields:
          - label: "Properties"
            name: "properties"
            widget: "list"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Price"
                name: "price"
                widget: "string"