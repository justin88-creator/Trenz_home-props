<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Trenzor Admin Dashboard
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:30px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:15px;
}

.header h1{
font-size:30px;
color:#111;
}

.logout-btn{
background:red;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

/* GRID */
.dashboard-grid{
display:grid;
grid-template-columns:
1fr 1fr;
gap:25px;
}

/* CARDS */
.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:
0 5px 20px
rgba(0,0,0,.08);
}

.card h2{
margin-bottom:20px;
color:#111;
}

/* FORM */
input,
textarea,
select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
font-size:15px;
}

textarea{
height:120px;
resize:none;
}

.upload-btn{
background:#ff2a2a;
color:white;
width:100%;
padding:15px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

/* PROPERTY LIST */
.property-list{
margin-top:20px;
}

.property-item{
padding:15px;
background:#fafafa;
border-radius:12px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
border-left:5px solid red;
}

.property-item h3{
margin-bottom:6px;
}

.delete-btn{
background:red;
color:white;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* BOOKINGS */
.booking-item{
padding:15px;
background:#fafafa;
border-radius:12px;
margin-bottom:15px;
border-left:5px solid red;
}

.booking-item h4{
margin-bottom:10px;
}

.booking-item p{
margin-bottom:6px;
}

.delete-booking-btn{
background:red;
color:white;
padding:10px 14px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

/* LOADING */
.loading-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
rgba(0,0,0,0.75);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.loader-box{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:300px;
box-shadow:
0 5px 20px
rgba(0,0,0,.2);
}

.spinner{
width:60px;
height:60px;
border:6px solid #ddd;
border-top:6px solid red;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
margin-bottom:20px;
}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

#loadingText{
font-size:18px;
font-weight:bold;
}

/* RESPONSIVE */
@media(max-width:1000px){

.dashboard-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

<h1>
Trenzor Admin Dashboard
</h1>

<button
class="logout-btn"
id="logoutBtn">

Logout

</button>

</div>


<!-- GRID -->
<div class="dashboard-grid">

<!-- PROPERTY FORM -->
<div class="card">

<h2>
Add Property
</h2>

<input
type="text"
id="title"
placeholder="Property Title">

<input
type="text"
id="location"
placeholder="Location">

<input
type="text"
id="price"
placeholder="Price">

<input
type="number"
id="bedrooms"
placeholder="Bedrooms">

<input
type="number"
id="bathrooms"
placeholder="Bathrooms">

<input
type="text"
id="size"
placeholder="Size">

<select id="status">

<option>
For Sale
</option>

<option>
For Rent
</option>

</select>

<textarea
id="description"
placeholder="Description">
</textarea>

<label>
Property Images
</label>

<input
type="file"
id="images"
multiple>

<button
class="upload-btn"
id="uploadBtn">

Upload Property

</button>

<button
class="upload-btn"
id="updateBtn"
style="
display:none;
margin-top:10px;
background:black;">

Update Property

</button>

<button
id="cancelEditBtn"
style="
display:none;
width:100%;
margin-top:10px;
padding:15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ddd;">

Cancel Edit

</button>

</div>


<!-- PROPERTIES -->
<div class="card">

<h2>
Uploaded Properties
</h2>

<div
id="propertyList"
class="property-list">

Loading properties...

</div>

</div>


<!-- BOOKINGS -->
<div class="card">

<h2>
Inspection Bookings
</h2>

<div
id="bookingList"
class="property-list">

Loading bookings...

</div>

</div>

</div>


<!-- LOADING -->
<div
id="loadingOverlay"
class="loading-overlay">

<div class="loader-box">

<div class="spinner"></div>

<p id="loadingText">
Uploading property...
</p>

</div>

</div>


<script
type="module"
src="vault-t92-admin.js">
</script>

</body>
</html>
