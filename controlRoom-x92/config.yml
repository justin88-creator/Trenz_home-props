local_backend: true

backend:
  name: test-repo

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "properties"
    label: "Properties"

    files:
      - label: "Property Listings"
        name: "propertyListings"
        file: "data/properties.json"

        fields:

          - label: "Properties"
            name: "properties"
            widget: "list"

            fields:

              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Location"
                name: "location"
                widget: "string"

              - label: "Price"
                name: "price"
                widget: "string"

              # MULTIPLE IMAGES
              - label: "Property Images"
                name: "images"
                widget: "list"

                field:
                  label: "Image"
                  name: "image"
                  widget: "image"

              - label: "Bedrooms"
                name: "bedrooms"
                widget: "number"
                value_type: "int"

              - label: "Bathrooms"
                name: "bathrooms"
                widget: "number"
                value_type: "int"

              - label: "Size"
                name: "size"
                widget: "string"

              - label: "Status"
                name: "status"
                widget: "select"

                options:
                  - "For Sale"
                  - "For Rent"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Inspection Fee"
                name: "inspectionFee"
                widget: "number"
                value_type: "int"