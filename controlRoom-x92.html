<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Admin Login
</title>

<link
rel="stylesheet"
href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f4f4;
}

.login-box{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
width:350px;
text-align:center;
}

.login-box h2{
margin-bottom:25px;
}

.login-box input{
width:100%;
padding:15px;
margin-bottom:20px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

.login-btn{
width:100%;
padding:15px;
background:#ff2a2a;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

#error{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login-box">

<h2>
Admin Login
</h2>

<input
type="email"
id="adminEmail"
placeholder="Admin Email">

<input
type="password"
id="adminPassword"
placeholder="Password">

<button id="loginBtn"
class="login-btn">
Login
</button>

<p id="error"></p>

</div>

<script
type="module"
src="controlRoom-x92.js">
</script>

</body>
</html>
